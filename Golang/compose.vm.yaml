services:
  api:
    image: "${BOOKSVC_IMAGE:?BOOKSVC_IMAGE is required}"
    env_file:
      - .env
    environment:
      BOOKSVC_HTTP_ADDRESS: "${BOOKSVC_HTTP_ADDRESS:-:8080}"
      BOOKSVC_DATABASE_CONNECTION_STRING: "${BOOKSVC_DATABASE_CONNECTION_STRING:?BOOKSVC_DATABASE_CONNECTION_STRING is required}"
      BOOKSVC_DATABASE_MAX_CONNECTIONS: "${BOOKSVC_DATABASE_MAX_CONNECTIONS:-10}"
    expose:
      - "8080"
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.vm.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped
