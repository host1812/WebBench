services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.140.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    env_file:
      - .env
    environment:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "${APPLICATIONINSIGHTS_CONNECTION_STRING:?APPLICATIONINSIGHTS_CONNECTION_STRING is required}"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped

  api:
    image: "${BOOKSVC_IMAGE:?BOOKSVC_IMAGE is required}"
    env_file:
      - .env
    environment:
      BOOKSVC_HTTP_ADDRESS: "${BOOKSVC_HTTP_ADDRESS:-:8080}"
      BOOKSVC_DATABASE_CONNECTION_STRING: "${BOOKSVC_DATABASE_CONNECTION_STRING:?BOOKSVC_DATABASE_CONNECTION_STRING is required}"
      BOOKSVC_TELEMETRY_ENABLED: "${BOOKSVC_TELEMETRY_ENABLED:-true}"
      BOOKSVC_TELEMETRY_SERVICE_NAME: "${BOOKSVC_TELEMETRY_SERVICE_NAME:-books-service}"
      BOOKSVC_TELEMETRY_ENVIRONMENT: "${BOOKSVC_TELEMETRY_ENVIRONMENT:-azure-vm}"
      BOOKSVC_TELEMETRY_OTLP_ENDPOINT: "${BOOKSVC_TELEMETRY_OTLP_ENDPOINT:-otel-collector:4318}"
      BOOKSVC_TELEMETRY_APPLICATION_INSIGHTS_CONNECTION_STRING: "${APPLICATIONINSIGHTS_CONNECTION_STRING:?APPLICATIONINSIGHTS_CONNECTION_STRING is required}"
    expose:
      - "8080"
    depends_on:
      - otel-collector
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.vm.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped
