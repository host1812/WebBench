services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-books}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    volumes:
      - ./migrations:/migrations:ro
    entrypoint:
      [
        "migrate",
        "-path",
        "/migrations",
        "-database",
        "${LOCAL_DATABASE_CONNECTION_STRING:?LOCAL_DATABASE_CONNECTION_STRING is required}"
      ]
    command: ["up"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: books-service:local
    env_file:
      - .env
    environment:
      BOOKSVC_HTTP_ADDRESS: "${BOOKSVC_HTTP_ADDRESS:-:8080}"
      BOOKSVC_DATABASE_CONNECTION_STRING: "${LOCAL_DATABASE_CONNECTION_STRING:?LOCAL_DATABASE_CONNECTION_STRING is required}"
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
