services:
  migrate:
    image: ${ACR_LOGIN_SERVER:?ACR_LOGIN_SERVER is required}/${IMAGE_NAME:?IMAGE_NAME is required}:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS}
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PORT: ${SERVER_PORT}
      TLS_CERT_PATH: ${TLS_CERT_PATH}
      TLS_KEY_PATH: ${TLS_KEY_PATH}
    command: ["migrate"]
    volumes:
      - ./certs:/app/certs:ro

  api:
    image: ${ACR_LOGIN_SERVER:?ACR_LOGIN_SERVER is required}/${IMAGE_NAME:?IMAGE_NAME is required}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS}
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PORT: ${SERVER_PORT}
      TLS_CERT_PATH: ${TLS_CERT_PATH}
      TLS_KEY_PATH: ${TLS_KEY_PATH}
    ports:
      - "${PUBLIC_HTTPS_PORT}:${SERVER_PORT}"
    volumes:
      - ./certs:/app/certs:ro
