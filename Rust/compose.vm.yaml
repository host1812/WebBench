services:
  api:
    image: ${BOOKSVC_IMAGE}
    restart: unless-stopped
    command: ["serve"]
    environment:
      BOOKSVC_HTTP_ADDRESS: ${BOOKSVC_HTTP_ADDRESS:-:8080}
      BOOKSVC_DATABASE_CONNECTION_STRING: ${BOOKSVC_DATABASE_CONNECTION_STRING}
      BOOKSVC_DATABASE_MAX_CONNECTIONS: ${BOOKSVC_DATABASE_MAX_CONNECTIONS:-10}
      BOOKSVC_TELEMETRY_ENABLED: ${BOOKSVC_TELEMETRY_ENABLED:-true}
      BOOKSVC_TELEMETRY_SERVICE_NAME: ${BOOKSVC_TELEMETRY_SERVICE_NAME:-books-service}
      BOOKSVC_TELEMETRY_ENVIRONMENT: ${BOOKSVC_TELEMETRY_ENVIRONMENT:-azure-vm}
      BOOKSVC_TELEMETRY_OTLP_ENDPOINT: ${BOOKSVC_TELEMETRY_OTLP_ENDPOINT:-otel-collector:4318}
      BOOKSVC_TELEMETRY_APPLICATION_INSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    expose:
      - "8080"

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.vm.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot-webroot:/var/www/certbot:ro
