services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${BOOKSVC_IMAGE:-rust-backend-service:local}
    environment:
      BOOKSVC_HTTP_ADDRESS: ${BOOKSVC_HTTP_ADDRESS:-:8080}
      BOOKSVC_DATABASE_CONNECTION_STRING: ${LOCAL_DATABASE_CONNECTION_STRING}
      BOOKSVC_DATABASE_MAX_CONNECTIONS: ${BOOKSVC_DATABASE_MAX_CONNECTIONS:-10}
      BOOKSVC_TELEMETRY_ENABLED: ${BOOKSVC_TELEMETRY_ENABLED:-false}
      BOOKSVC_TELEMETRY_SERVICE_NAME: ${BOOKSVC_TELEMETRY_SERVICE_NAME:-books-service}
      BOOKSVC_TELEMETRY_ENVIRONMENT: ${BOOKSVC_TELEMETRY_ENVIRONMENT:-local}
      BOOKSVC_TELEMETRY_OTLP_ENDPOINT: ${BOOKSVC_TELEMETRY_OTLP_ENDPOINT:-otel-collector:4318}
      BOOKSVC_TELEMETRY_APPLICATION_INSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
